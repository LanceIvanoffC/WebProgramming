<style>
/* Add your CSS here */

body {
  font-family: sans-serif;
}
.box {
  border: 5px solid blue;
  padding: 20px;
  margin: 20px;
  box-sizing: border-box;
  background-color: lightgray;
  width: 20rem;
  height: 12rem;
}
/* the padding looks to be relitave to the boarder thickness */

</style>
</head>
<body>
<h1>CSS Box Model Lab</h1>

<p>This is a demonstration of the CSS Box Model.</p>
</div>

<div class="box">
<p>This is box 2.</p>
</div>
